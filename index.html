<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Robot</title>
    <style>
        :root { --bg: #0d0d0f; --accent: #00f2ff; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { text-align: center; width: 90%; max-width: 500px; }
        #status { height: 30px; margin-bottom: 10px; color: var(--accent); font-size: 0.8em; letter-spacing: 1px; }
        .orb {
            width: 100px; height: 100px; background: radial-gradient(circle, var(--accent) 0%, #0044ff 100%);
            border-radius: 50%; border: none; cursor: pointer; margin: 0 auto 30px; font-size: 40px;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3); transition: 0.3s;
        }
        .orb.listening { transform: scale(1.1); box-shadow: 0 0 40px var(--accent); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        .box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; margin-top: 10px; text-align: left; border: 1px solid rgba(255,255,255,0.1); }
        .label { font-size: 0.7em; color: var(--accent); margin-bottom: 5px; text-transform: uppercase; }
        #user-text { min-height: 1.5em; color: #ccc; }
        #ai-text { min-height: 1.5em; color: #fff; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <div id="status">Нажми, чтобы начать</div>
        <button id="start-btn" class="orb">🎤</button>
        
        <div class="box">
            <div class="label">Вы сказали:</div>
            <div id="user-text">Ожидание...</div>
        </div>

        <div class="box">
            <div class="label">Ответ робота:</div>
            <div id="ai-text">...</div>
        </div>
    </div>

    <script>
        const API_KEY = "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";
        const MODEL = "google/gemini-2.0-flash-exp:free";

        const btn = document.getElementById('start-btn');
        const status = document.getElementById('status');
        const userDisplay = document.getElementById('user-text');
        const aiDisplay = document.getElementById('ai-text');

        let isRecording = false;

        // Синтез речи
        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ru-RU';
            window.speechSynthesis.speak(msg);
        }

        // Запрос к ИИ
        async function askAI(text) {
            if (!text || text.length < 2) return;
            status.innerText = "ИИ ДУМАЕТ...";
            try {
                const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${API_KEY}`,
                        "Content-Type": "application/json",
                        "HTTP-Referer": window.location.href,
                        "X-Title": "Robot"
                    },
                    body: JSON.stringify({
                        "model": MODEL,
                        "messages": [{"role": "system", "content": "Ты Алиса. Отвечай кратко."}, {"role": "user", "content": text}]
                    })
                });
                const data = await res.json();
                const answer = data.choices[0].message.content;
                aiDisplay.innerText = answer;
                status.innerText = "ЖДУ КОМАНДУ";
                speak(answer);
            } catch (e) {
                status.innerText = "ОШИБКА API";
            }
        }

        // Настройка распознавания
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            status.innerText = "БРАУЗЕР НЕ ПОДДЕРЖИВАЕТ STT";
        } else {
            const recognition = new SpeechRecognition();
            recognition.lang = 'ru-RU';
            recognition.interimResults = true;
            recognition.continuous = false;

            btn.onclick = () => {
                if (isRecording) {
                    recognition.stop();
                } else {
                    try {
                        window.speechSynthesis.cancel();
                        recognition.start();
                    } catch (e) {
                        recognition.abort(); // Если зависло — сбрасываем жестко
                        setTimeout(() => recognition.start(), 300);
                    }
                }
            };

            recognition.onstart = () => {
                isRecording = true;
                btn.classList.add('listening');
                status.innerText = "СЛУШАЮ...";
                userDisplay.innerText = "Голос обрабатывается...";
            };

            recognition.onresult = (event) => {
                let current = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    current += event.results[i][0].transcript;
                }
                userDisplay.innerText = current;

                // Если это финальный результат — отправляем в ИИ
                if (event.results[0].isFinal) {
                    recognition.stop();
                    askAI(current);
                }
            };

            recognition.onerror = (event) => {
                console.log("Ошибка Recognition:", event.error);
                if (event.error === 'aborted') {
                    // Просто игнорируем, если это был ручной сброс
                } else {
                    status.innerText = "ОШИБКА: " + event.error;
                }
                stopUI();
            };

            recognition.onend = () => {
                stopUI();
            };

            function stopUI() {
                isRecording = false;
                btn.classList.remove('listening');
                if (status.innerText === "СЛУШАЮ...") status.innerText = "ЖДУ КОМАНДУ";
            }
        }
    </script>
</body>
</html>
