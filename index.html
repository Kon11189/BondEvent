<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Робот "Алиса-Lite"</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #status { color: #00ff00; margin-bottom: 20px; font-size: 1.2em; }
        #response { width: 80%; text-align: center; font-style: italic; color: #ccc; }
        .mic-btn { width: 100px; height: 100px; border-radius: 50%; border: none; background: #ff0055; cursor: pointer; box-shadow: 0 0 20px rgba(255, 0, 85, 0.5); font-size: 2em; }
        .recording { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="status">Нажми на кнопку и говори</div>
    <button id="start-btn" class="mic-btn">🎤</button>
    <p id="response">Здесь будет ответ...</p>

    <script>
        const API_KEY = "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";
        const btn = document.getElementById('start-btn');
        const status = document.getElementById('status');
        const responseText = document.getElementById('response');

        // 1. ГОЛОС (Синтез речи)
        function say(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ru-RU';
            window.speechSynthesis.speak(utterance);
        }

        // 2. МОЗГ (Запрос к OpenRouter)
        async function askAI(userText) {
            status.innerText = "ИИ думает...";
            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    "model": "arcee-ai/trinity-large-preview:free",
                    "messages": [
                        {"role": "system", "content": "Ты — умный и остроумный робот-помощник. Отвечай кратко, как Алиса."},
                        {"role": "user", "content": userText}
                    ]
                })
            });
            const data = await response.json();
            const aiText = data.choices[0].message.content;
            responseText.innerText = aiText;
            status.innerText = "Готово!";
            say(aiText);
        }

        // 3. УШИ (Распознавание речи)
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'ru-RU';

        btn.onclick = () => {
            recognition.start();
            btn.classList.add('recording');
            status.innerText = "Слушаю вас...";
        };

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            btn.classList.remove('recording');
            askAI(transcript);
        };

        recognition.onerror = () => {
            btn.classList.remove('recording');
            status.innerText = "Ошибка распознавания. Попробуй еще раз.";
        };
    </script>
</body>
</html>
