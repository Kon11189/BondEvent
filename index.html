    <style>

        * {

        html {

        .hero-video {
            position: relative;
            height: 100vh;
            height: 100dvh;
            min-height: 500px;
            overflow: hidden;
            margin-top: 0;
            width: 100%;

        .scroll-indicator {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: rgba(255, 255, 255, 0.8);
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            animation: float 2s ease-in-out infinite;
        }
        
        .scroll-indicator .arrow {
            width: 24px;
            height: 24px;
            border-right: 2px solid white;
            border-bottom: 2px solid white;
            transform: rotate(45deg);
            margin-top: 8px;
            animation: bounce 2s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-5px); }
        }
        
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0) rotate(45deg); }
            40% { transform: translateY(5px) rotate(45deg); }
            60% { transform: translateY(2px) rotate(45deg); }
        }

        .back-video {
            position: absolute;
            top: 0;
            left: 0;

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .quest-grid { display: flex; flex-wrap: wrap; margin: 0 -12px; transition: all 0.3s; }
        .quest-col {
            padding: 0 12px;
            margin-bottom: 40px;
            width: 100%;

        @media (min-width: 992px) { .quest-col { width: 25%; } }
        .quest-col.expanded { width: 100% !important; }
        
        .quest-card {
            background: #fff;
            border-radius: 28px;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            height: 100%;

            flex-direction: column;

            animation: cardFadeIn 0.8s ease forwards;
        }
        @keyframes cardFadeIn { to { opacity: 1; transform: translateY(0); } }
        .quest-card::before {
            content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
            border-radius: 30px; padding: 2px;
            background: linear-gradient(45deg, #FFD700, #FFA500, #FFD700, #FFA500);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor; mask-composite: exclude;
            opacity: 0; transition: opacity 0.6s ease; pointer-events: none;
        }
        .quest-card.expanded-card {
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            transform: scale(1.02);
            border-color: transparent;
        }
        .quest-card.expanded-card::before { opacity: 1; animation: borderGlow 3s linear infinite; }
        @keyframes borderGlow {
            0% { background: linear-gradient(45deg, #FFD700, #FFA500, #FFD700, #FFA500); }

            100% { background: linear-gradient(45deg, #FFD700, #FFA500, #FFD700, #FFA500); }

        .quest-card:not(.expanded-card):hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }

        .quest-info { padding: 20px 16px 24px; flex-grow: 1; display: flex; flex-direction: column; }

        .quest-detail-btn {
